<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hors ligne · ASSJM HUB</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0a1733;
        color: #eef3fb;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        padding: 2rem;
        text-align: center;
      }
      .wrap { max-width: 420px; }
      .badge {
        display: inline-grid;
        place-items: center;
        width: 4rem;
        height: 4rem;
        border-radius: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.05);
        font-size: 2rem;
      }
      h1 { font-size: 1.5rem; margin: 1.25rem 0 0.5rem; }
      p { color: #9fb2d4; line-height: 1.6; margin: 0; }
      button {
        margin-top: 1.75rem;
        cursor: pointer;
        border: none;
        border-radius: 9999px;
        background: #e11d2a;
        color: #fff;
        font-weight: 700;
        font-size: 0.95rem;
        padding: 0.75rem 1.75rem;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <span class="badge">📡</span>
      <h1>Vous êtes hors ligne</h1>
      <p>
        Pas de connexion pour le moment. Vérifiez votre réseau — l'ASSJM HUB
        revient dès que vous êtes reconnecté.
      </p>
      <button onclick="location.reload()">Réessayer</button>
    </div>
  </body>
</html>
