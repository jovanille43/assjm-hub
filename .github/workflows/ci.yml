name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Annule les runs précédents encore en cours sur la même branche/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Types · Tests · Build
    runs-on: ubuntu-latest

    env:
      # Valeurs factices : la CI ne se connecte à aucun service réel.
      # SQLite sur fichier suffit au prerender du build Next.
      DATABASE_URL: "file:./ci.db"
      AUTH_SECRET: "ci-not-a-real-secret"
      AUTH_TRUST_HOST: "true"
      NEXT_PUBLIC_SITE_URL: "http://localhost:3000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm ci` déclenche postinstall → `prisma generate`.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      # Crée le schéma SQLite + données de démo pour le prerender du build.
      - name: Prepare database
        run: npm run db:reset

      - name: Build
        run: npm run build
